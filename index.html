<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Video Background</title>
  <style>
.header {
  position: relative;
  height: 100vh;
  min-height: 25rem;
  width: 100%;
  overflow: hidden;
  background: black;
  z-index: -3;
}

.header video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  width: auto;
  height: auto;
  z-index: -3;
  -ms-transform: translateX(-50%) translateY(-50%);
  -moz-transform: translateX(-50%) translateY(-50%);
  -webkit-transform: translateX(-50%) translateY(-50%);
  transform: translateX(-50%) translateY(-50%);
}

.overlay {
  background-color: white;
  z-index: -2;
  opacity: 0.7;
}

  </style>
</head>
<body>
<header class="header">
  <video playsInline="playsinline" autoPlay="autoplay" loop="loop" muted>
    <source src="sap.mp4" type="video/mp4"/>
    Your browser does not support the video tag.
  </video>
  <div class="overlay">
    <span>HOME</span>
  </div>
  <div style="color:white">
    button
  </div>
</header>
</body>
</html>
