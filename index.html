<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Video Background</title>
  <style>
		body {
			margin: 0;
			padding: 0;
			background: #000;
			color: #fff;
			font-family: sans-serif;
		}
		video {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			min-width: 100%;
			min-height: 100%;
			width: auto;
			height: auto;
			z-index: -1;
		}
		button {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			padding: 10px 20px;
			background: #fff;
			color: #000;
			border: none;
			border-radius: 5px;
			font-size: 20px;
			cursor: pointer;
		}
		.navbar {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			background: rgba(0, 0, 0, 0.5);
			padding: 10px;
			box-sizing: border-box;
			z-index: 1;
		}
		.navbar a {
			color: #fff;
			text-decoration: none;
			margin-right: 20px;
			font-size: 20px;
		}


  </style>
</head>
<body>
<video autoplay muted loop>
  <source src="sap.mp4" type="video/mp4">
</video>
<button>Click me</button>
<div class="navbar">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</div>
</body>
</html>
